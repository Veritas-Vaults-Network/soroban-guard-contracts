name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo test --all

  build-wasm:
    name: Build WASM
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - run: cargo build --release --target wasm32-unknown-unknown
      - uses: actions/upload-artifact@v4
        with:
          name: wasm-artifacts
          path: target/wasm32-unknown-unknown/release/*.wasm

  size-check:
    name: WASM size check (max 64 KB)
    runs-on: ubuntu-latest
    needs: build-wasm
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: wasm-artifacts
          path: wasm
      - name: Check WASM sizes
        run: |
          LIMIT=65536
          FAILED=0
          for f in wasm/*.wasm; do
            size=$(wc -c < "$f")
            echo "$(basename $f): ${size} bytes"
            if [ "$size" -gt "$LIMIT" ]; then
              echo "  ERROR: $(basename $f) exceeds 64 KB limit (${size} > ${LIMIT})"
              FAILED=1
            fi
          done
          exit $FAILED
